name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Typecheck & Build
        run: pnpm run build
      
      - name: Run Tests
        run: pnpm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        # Example step: run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        run: echo "Mock Docker Login"

      - name: Build Docker Image
        run: docker compose -f docker/docker-compose.yml build

      - name: Push Docker Image
        # Example step: run: docker push myregistry/docuforge-server:latest
        run: echo "Mock Docker Push"

      - name: Deploy to Cloud
        # Example step for ECS: run: aws ecs update-service --cluster docuforge --service docuforge-service --force-new-deployment
        run: echo "Mock Cloud Deploy"
