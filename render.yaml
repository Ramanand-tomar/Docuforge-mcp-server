services:
  - type: web
    name: docuforge-server
    env: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: STORAGE_TYPE
        value: sqlite
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MCP_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
